# Mouse: scroll, click panes/windows, drag borders, drag-select copy.
set -g mouse on

# Sync tmux copy buffer with the system clipboard so OSC 52 / pbcopy work.
set -s set-clipboard on

# Mouse drag-select copies to the system clipboard (macOS).
if-shell "uname | grep -q Darwin" \
  "bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'pbcopy'"

# Bigger scrollback buffer.
set -g history-limit 50000

# Start window/pane numbering at 1 (easier to reach on the keyboard).
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed so there are no gaps.
set -g renumber-windows on

# Faster command sequences (no escape-key delay in vim etc.).
set -sg escape-time 10
