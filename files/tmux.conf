# Mouse: scroll, click panes/windows, drag borders, drag-select copy.
set -g mouse on

# Sync tmux copy buffer with the system clipboard via OSC 52, but only
# when not inside an SSH session. When tmux starts with `set-clipboard on`
# it probes the outer terminal for clipboard support; some terminals
# (notably xterm.js, used by VS Code / Cursor / web shells) reply with
# bytes that get printed as garbage like
#   ^[[?62;4;9;22c^[[>0;276;0c^[P>|xterm.js(...)^[\
# at the start of programs that don't swallow DCS replies (e.g. a Rails
# console launched directly by tmux). Skipping it on remote hosts avoids
# the noise; locally on macOS the probe works cleanly.
if-shell '[ -z "$SSH_CONNECTION" ]' "set -s set-clipboard on"

# Mouse drag-select copies to the system clipboard (macOS).
if-shell "uname | grep -q Darwin" \
  "bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'pbcopy'"

# Bigger scrollback buffer.
set -g history-limit 50000

# Start window/pane numbering at 1 (easier to reach on the keyboard).
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed so there are no gaps.
set -g renumber-windows on

# Faster command sequences (no escape-key delay in vim etc.).
set -sg escape-time 10
